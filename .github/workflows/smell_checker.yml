name: Smell Checker (Designite Java)

on:
  pull_request:
  workflow_dispatch:

jobs:
  designite:
    name: Smell Check (Designite Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download DesigniteJava
        run: |
          mkdir -p tools
          curl -L -o tools/DesigniteJava.jar \
            "https://github.com/tushartushar/DesigniteJava/releases/download/v2.0.0/DesigniteJava.jar"

      - name: Build project first
        run: ./gradlew assemble -x :blockly:npmInstall

      - name: Run Designite on dungeon
        run: |
          java -jar tools/DesigniteJava.jar \
            -i dungeon/src \
            -o build/designite/dungeon \
            -f XML || true

      - name: Run Designite on portal
        run: |
          java -jar tools/DesigniteJava.jar \
            -i portal/src \
            -o build/designite/portal \
            -f XML || true

      - name: Run Designite on escapeRoom
        run: |
          java -jar tools/DesigniteJava.jar \
            -i escapeRoom/src \
            -o build/designite/escapeRoom \
            -f XML || true

      - name: Upload Smell Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: designite-smell-reports
          path: build/designite/
