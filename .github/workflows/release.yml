name: Release Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-jars:
    name: Build JARs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'blockly/frontend/package-lock.json'

      - name: Build Frontend
        run: |
          cd blockly/frontend
          npm install
          npm run build

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build JARs
        run: ./gradlew jarDesktop jarWeb

      - name: Upload JAR Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Blockly-JARs
          path: blockly/build/libs/*.jar

  build-executables:
    name: Build Executables (${{ matrix.platform_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform_name: windows-x86_64
          - os: ubuntu-latest
            platform_name: linux-x86_64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Desktop Executable
        run: ./gradlew :blockly:jpackageImage

      - name: Archive Desktop Executable
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a Blockly-desktop-${{ matrix.platform_name }}.zip ./blockly/build/jpackage/blockly
          else
            tar -czf Blockly-desktop-${{ matrix.platform_name }}.tar.gz -C blockly/build/jpackage blockly
          fi
        shell: bash

      - name: Upload Executable Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: executable-${{ matrix.os }}
          path: Blockly-*

  upload-extension:
    name: Upload VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Upload VS Code Extension
        uses: actions/upload-artifact@v7
        with:
          name: vs-code-extension
          path: doc/produs_unterlagen/blockly-code-runner-*.vsix

  release:
    name: Create GitHub Release
    needs: [build-jars, build-executables, upload-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release (Draft)
        run: |
          TAG="v1.0.${{ github.run_number }}"
          gh release create "$TAG" *.jar *.vsix *.zip *.tar.gz \
            --title "Release $TAG" \
            --notes-file ".github/workflows/releaseInstructions.md" \
            --draft=true \
            --prerelease=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
