name: Code Coverage (JaCoCo)

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  coverage:
    name: JaCoCo Code Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Run tests and generate JaCoCo report
        run: ./gradlew clean test jacocoTestReport

      - name: JaCoCo Coverage Report
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: |
            ${{ github.workspace }}/dungeon/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/escapeRoom/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/theLastHourEscapeRoom/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 40
          min-coverage-changed-files: 60
          title: JaCoCo Code Coverage

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jacoco-report
          path: |
            dungeon/build/reports/jacoco/
            escapeRoom/build/reports/jacoco/
